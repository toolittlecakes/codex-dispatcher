<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#126b5a" />
    <title>Codex Dispatcher</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <button class="sidebar-backdrop hidden" id="sidebarBackdrop" type="button" aria-label="Close threads"></button>

      <aside class="thread-pane" id="threadPane">
        <header class="pane-header">
          <div class="brand-row">
            <div class="brand-mark">C</div>
            <div>
              <div class="eyebrow">Remote</div>
              <h1>Codex</h1>
            </div>
          </div>
          <button class="icon-button" id="refreshButton" type="button" title="Refresh threads" aria-label="Refresh threads">↻</button>
        </header>

        <div class="sidebar-controls">
          <label class="field search-field">
            <span>Search</span>
            <input id="searchInput" autocomplete="off" placeholder="Filter threads" />
          </label>

          <button class="primary-button" id="newThreadButton" type="button">+ New thread</button>
        </div>

        <div class="thread-list" id="threadList"></div>
      </aside>

      <main class="chat-pane">
        <header class="chat-header">
          <button class="icon-button mobile-only" id="threadsButton" type="button" aria-label="Open threads">☰</button>
          <div class="thread-title-block">
            <div class="thread-title-row">
              <div class="thread-title" id="threadTitle">No thread selected</div>
              <div class="status-cluster">
                <div class="ipc-pill" id="ipcPill">IPC starting</div>
                <div class="status-pill" id="statusPill">Starting</div>
              </div>
            </div>
            <div class="thread-meta" id="threadMeta">Connect and pick a session</div>
          </div>
        </header>

        <section class="token-panel hidden" id="tokenPanel">
          <h2>Access token</h2>
          <p>The dispatcher requires the token printed by the server.</p>
          <form id="tokenForm">
            <input id="tokenInput" name="token" autocomplete="off" />
            <button type="submit">Connect</button>
          </form>
        </section>

        <section class="messages" id="messages"></section>

        <section class="approval-tray hidden" id="approvalTray">
          <div class="tray-header">
            <strong>Approval requests</strong>
            <span id="approvalCount"></span>
          </div>
          <div id="approvalList"></div>
        </section>

        <form class="composer" id="composer">
          <div class="composer-top">
            <label class="field cwd-field">
              <span>CWD</span>
              <input id="cwdInput" autocomplete="off" />
            </label>
            <span class="session-mode" id="sessionModePill">App server</span>
            <span class="active-turn hidden" id="activeTurnPill">Active turn</span>
          </div>
          <div class="composer-row">
            <textarea id="promptInput" rows="1" placeholder="Message Codex"></textarea>
            <button class="danger-button hidden" id="stopButton" type="button">Stop</button>
            <button class="send-button" id="sendButton" type="submit">Send</button>
          </div>
        </form>
      </main>
    </div>

    <script src="/app.js" type="module"></script>
  </body>
</html>
