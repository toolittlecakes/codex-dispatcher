name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  darwin-arm64:
    name: macOS arm64 binary
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Validate release tag
        run: |
          if ! printf '%s' "${GITHUB_REF_NAME}" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Release tags must use vX.Y.Z semver format." >&2
            exit 1
          fi

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Test
        run: bun test

      - name: Typecheck
        run: bun run typecheck

      - name: Build binary
        run: bun build --compile --target=bun --outfile=dist/codex-dispatcher-darwin-arm64 src/cli.ts

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
          ASSET_PATH: dist/codex-dispatcher-darwin-arm64
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "$ASSET_PATH" --clobber
            gh release edit "$RELEASE_TAG" --title "codex-dispatcher $RELEASE_TAG" --notes "Release $RELEASE_TAG" --latest
          else
            gh release create "$RELEASE_TAG" "$ASSET_PATH" --title "codex-dispatcher $RELEASE_TAG" --notes "Release $RELEASE_TAG" --latest
          fi
