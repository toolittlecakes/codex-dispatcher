name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  darwin-arm64:
    name: macOS arm64 binary
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Resolve release version
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="$(bun -e 'console.log(require("./package.json").version)')"
          if ! printf '%s' "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "package.json version must use X.Y.Z semver format." >&2
            exit 1
          fi
          RELEASE_TAG="v$VERSION"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "Release $RELEASE_TAG already exists; skipping."
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.version.outputs.should_release == 'true'
        run: bun install --frozen-lockfile

      - name: Test
        if: steps.version.outputs.should_release == 'true'
        run: bun test

      - name: Typecheck
        if: steps.version.outputs.should_release == 'true'
        run: bun run typecheck

      - name: Build binary
        if: steps.version.outputs.should_release == 'true'
        run: bun build --compile --target=bun --outfile=dist/codex-dispatcher-darwin-arm64 src/cli.ts

      - name: Publish release
        if: steps.version.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.version.outputs.release_tag }}
          ASSET_PATH: dist/codex-dispatcher-darwin-arm64
        run: |
          git tag "$RELEASE_TAG" "$GITHUB_SHA"
          git push origin "refs/tags/$RELEASE_TAG"
          gh release create "$RELEASE_TAG" "$ASSET_PATH" --title "codex-dispatcher $RELEASE_TAG" --notes "Release $RELEASE_TAG" --latest
